<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Icon Export</title></head>
<body style="text-align:center;font-family:system-ui;background:#1a1a2e;color:#eee;padding:40px">
<h2>Moon Note Icon Exporter</h2>
<canvas id="c" width="1024" height="1024" style="display:none"></canvas>
<img id="preview" style="width:128px;border-radius:22%;margin:16px;box-shadow:0 4px 16px rgba(0,0,0,0.4)">

<div id="svg-container" style="display:none">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" /><stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" /><stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" /><stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  <g id="moon"><circle cx="55" cy="45" r="32" fill="url(#moonGrad)" opacity="0.9"/><circle cx="45" cy="35" r="6" fill="#B45309" opacity="0.3"/><circle cx="65" cy="30" r="4" fill="#B45309" opacity="0.3"/><circle cx="50" cy="60" r="8" fill="#B45309" opacity="0.3"/></g>
  <g id="paper"><rect x="24" y="46" width="52" height="40" rx="6" fill="url(#paperGrad)"/><path d="M 66 46 L 76 56 L 66 56 Z" fill="#CBD5E1"/></g>
  <g id="text-lines"><line x1="34" y1="58" x2="66" y2="58" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/><line x1="34" y1="66" x2="60" y2="66" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/><line x1="34" y1="74" x2="54" y2="74" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/></g>
  <g id="pen" transform="translate(5,5)"><line x1="45" y1="35" x2="65" y2="55" stroke="#FDE047" stroke-width="4" stroke-linecap="round"/><polygon points="65,55 70,54 67,58" fill="#FDE047"/></g>
  <g id="crescent"><path d="M 82 18 A 15 15 0 1 0 97 33 A 14 14 0 1 1 82 18 Z" fill="#FDE047"/></g>
</svg>
</div>

<p><button onclick="exportPNG(1024)" style="padding:12px 32px;font-size:16px;cursor:pointer;border:none;background:#FDE047;color:#0F172A;border-radius:8px;font-weight:bold">Download 1024x1024 PNG</button></p>
<p style="font-size:13px;color:#888">Save this file to <code>D:\moon_note\assets\icon.png</code></p>

<script>
const svg = document.querySelector('#svg-container').innerHTML;
const canvas = document.getElementById('c');
const preview = document.getElementById('preview');

function render() {
  const img = new Image();
  const svgBlob = new Blob([svg], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(svgBlob);
  img.onload = () => {
    canvas.getContext('2d').drawImage(img, 0, 0);
    preview.src = canvas.toDataURL();
    URL.revokeObjectURL(url);
  };
  img.src = url;
}
render();

function exportPNG(size) {
  const c2 = document.createElement('canvas');
  c2.width = c2.height = size;
  const img = new Image();
  const svgBlob = new Blob([svg], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(svgBlob);
  img.onload = () => {
    c2.getContext('2d').drawImage(img, 0, 0, size, size);
    c2.toBlob(b => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = 'icon.png';
      a.click();
      URL.revokeObjectURL(url);
    });
  };
  img.src = url;
}
</script>
</body></html>
